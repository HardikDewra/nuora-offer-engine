name: Run Offer Analysis

on:
  push:
    paths:
      - 'data/test_results/**'
      - 'engine/**'
      - 'config/**'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python run_analysis.py

      - name: Commit updated report
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add reports/analysis_report.md
          git diff --cached --quiet || git commit -m "Auto-update analysis report [skip ci]"
          git push
